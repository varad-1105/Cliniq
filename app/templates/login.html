{% extends "base.html" %}

{% block title %}Login - ClinIQ{% endblock %}
{% block body_class %}auth-body{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <span class="brand-mark">+</span>
            <span class="brand-name">ClinIQ</span>
        </div>

        <h1 class="auth-title">Staff Login</h1>
        <p class="auth-subtitle">Simple access for doctors and receptionists to manage clinic work.</p>

        <form method="POST" class="form-stack">
            <div class="form-group">
                <label class="form-label" for="email">Email address</label>
                <input class="form-control" id="email" type="email" name="email" autocomplete="email" placeholder="doctor@cliniq.com" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" id="password" type="password" name="password" autocomplete="current-password" placeholder="Enter password" required>
            </div>

            <div class="flex flex-wrap gap-3">
                <button class="btn btn-primary btn-block" type="submit">Login</button>
                <a class="btn btn-outline btn-block" href="{{ url_for('patient.book_appointment') }}">Book as Patient</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
