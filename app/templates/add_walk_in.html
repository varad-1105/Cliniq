{% extends "base.html" %}

{% block title %}Add Walk-in - ClinIQ{% endblock %}

{% block content %}
<section class="section">
    <div class="container-narrow">
        <div class="card">
            <div class="card-header">
                <div>
                    <p class="eyebrow">Reception Desk</p>
                    <h1>Add Walk-in Patient</h1>
                    <p class="text-muted">Register a patient who arrived without an online booking.</p>
                </div>
            </div>

            <form method="POST" class="card-body form-stack">
                <div class="form-group">
                    <label class="form-label" for="patient_name">Patient Name</label>
                    <input class="form-control" id="patient_name" type="text" name="patient_name" value="{{ form.patient_name if form else '' }}" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="phone_number">Phone Number</label>
                    <input class="form-control" id="phone_number" type="tel" name="phone_number" value="{{ form.phone_number if form else '' }}" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="reason_for_visit">Reason for Visit</label>
                    <textarea class="form-control" id="reason_for_visit" name="reason_for_visit" rows="4" required>{{ form.reason_for_visit if form else '' }}</textarea>
                </div>

                <div class="flex flex-wrap gap-3">
                    <button class="btn btn-primary" type="submit">Add Walk-in</button>
                    <a class="btn btn-outline" href="{{ url_for('dashboard.manage_appointments') }}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
